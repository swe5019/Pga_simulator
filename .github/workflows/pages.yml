name: Deploy Birdie to GitHub Pages

# Publishes the static site (index.html + assets/) to GitHub Pages.
# Runs on every push to the development branch, and can be run manually.
on:
  push:
    branches: ["claude/draftkings-pga-website-tfu21k"]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to enable and deploy Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
