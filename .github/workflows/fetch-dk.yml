name: Fetch DK salaries

on:
  workflow_dispatch:
    inputs:
      contest_id:
        description: DraftKings contest ID (optional if draftgroup_id given)
        required: false
        default: ''
      draftgroup_id:
        description: DraftKings draft group ID (optional; overrides contest)
        required: false
        default: ''
      tournament_name:
        description: Tournament_Name value for the rows
        required: true
        default: 'TRAVELERS_2026'
      date:
        description: Date value for the rows
        required: true
        default: '6/25/26'
      list:
        description: List open GOLF draft groups instead of fetching (1 = list)
        required: false
        default: ''
      probe_contest:
        description: Probe a contest ID for payout endpoints (diagnostic only)
        required: false
        default: ''
      probe_dg:
        description: Probe payouts for real contests of a draft group (diagnostic)
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch DraftKings salaries
        env:
          DK_CONTEST_ID: ${{ inputs.contest_id }}
          DK_DRAFTGROUP_ID: ${{ inputs.draftgroup_id }}
          DK_TOURNAMENT: ${{ inputs.tournament_name }}
          DK_DATE: ${{ inputs.date }}
          DK_LIST: ${{ inputs.list }}
          DK_PROBE_CONTEST: ${{ inputs.probe_contest }}
          DK_PROBE_DG: ${{ inputs.probe_dg }}
        run: python tools/fetch_dk.py

      - name: Commit CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dk_salaries.csv data/dk.json
          if git diff --cached --quiet; then
            echo "No change in DK data"
          else
            git commit -m "Fetch DK salaries + status for ${{ inputs.tournament_name }}"
            git push
          fi
