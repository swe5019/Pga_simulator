name: Fetch DK salaries

on:
  # Auto-discover the current main PGA slate a few times a day. DK posts the
  # next event's contests Mon/Tue, so this picks up salaries on its own with no
  # manual contest id. Runs that find no new slate exit cleanly (no commit).
  schedule:
    - cron: '0 13,17,21 * * *'   # 3x/day (UTC)
  workflow_dispatch:
    inputs:
      auto:
        description: Auto-discover the current main PGA slate (1 = on; ignores ids/name)
        required: false
        default: ''
      contest_id:
        description: DraftKings contest ID (optional if draftgroup_id given)
        required: false
        default: ''
      draftgroup_id:
        description: DraftKings draft group ID (optional; overrides contest)
        required: false
        default: ''
      tournament_name:
        description: Tournament_Name value (optional in auto mode)
        required: false
        default: ''
      date:
        description: Date value (optional in auto mode)
        required: false
        default: ''
      results_contest_id:
        description: Pull real ownership from this COMPLETED contest id (needs DK_COOKIE secret)
        required: false
        default: ''
      results_find:
        description: 'Or match a completed contest by name, e.g. "Caddie" (uses dk_contests.json)'
        required: false
        default: ''
      list:
        description: List open GOLF draft groups instead of fetching (1 = list)
        required: false
        default: ''
      probe_contest:
        description: Probe a contest ID for payout endpoints (diagnostic only)
        required: false
        default: ''
      probe_dg:
        description: Probe payouts for real contests of a draft group (diagnostic)
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: fetch-dk
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch DraftKings salaries
        env:
          # Schedule runs are always auto; manual runs use the 'auto' input.
          DK_AUTO: ${{ github.event_name == 'schedule' && '1' || inputs.auto }}
          DK_CONTEST_ID: ${{ inputs.contest_id }}
          DK_DRAFTGROUP_ID: ${{ inputs.draftgroup_id }}
          DK_TOURNAMENT: ${{ inputs.tournament_name }}
          DK_DATE: ${{ inputs.date }}
          DK_LIST: ${{ inputs.list }}
          DK_PROBE_CONTEST: ${{ inputs.probe_contest }}
          DK_PROBE_DG: ${{ inputs.probe_dg }}
          # Post-contest ownership (results mode) — needs the DK_COOKIE secret.
          DK_RESULTS_CONTEST: ${{ inputs.results_contest_id }}
          DK_RESULTS_FIND: ${{ inputs.results_find }}
          DK_COOKIE: ${{ secrets.DK_COOKIE }}
        run: python tools/fetch_dk.py

      - name: Commit CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dk_salaries.csv data/dk.json data/dk_showdown.json data/dk_contests.json data/actual_ownership.json
          if git diff --cached --quiet; then
            echo "No change in DK data"
          else
            git commit -m "Fetch DK data (salaries / status / results ownership)"
            git push
          fi
