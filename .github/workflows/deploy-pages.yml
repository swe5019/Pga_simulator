name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Re-deploy after the data workflows commit fresh slate.json / dk.json.
  # (Their bot pushes use GITHUB_TOKEN, which can't trigger 'push', but
  # workflow_run fires regardless — so auto-synced data reaches the live site.)
  workflow_run:
    workflows: ["Sync slate from master spreadsheet", "Fetch DK salaries"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Only the latest deploy matters; cancel superseded ones so rapid code +
  # data commits don't collide on the single Pages environment.
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache-bust assets
        # Append ?v=<commit sha> to every local JS/CSS reference so browsers and
        # the Pages CDN always fetch the just-deployed code instead of a stale
        # cached copy. Runs only on the artifact we upload (repo stays clean).
        run: |
          V="${GITHUB_SHA::8}"
          sed -i -E "s#(href=\"assets/[^\"?]+\.css)\"#\1?v=$V\"#g; s#(src=\"assets/[^\"?]+\.js)\"#\1?v=$V\"#g" index.html
          echo "Cache-busted assets with v=$V:"
          grep -nE 'assets/.*\?v=' index.html || true
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
